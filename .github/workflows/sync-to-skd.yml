name: Sync to SKD Photo Studio's Frame2Frame

on:
  push:
    branches:
      - main

jobs:
  repo-sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to SKD
        env:
          SKD_TOKEN: ${{ secrets.SKD_PHOTO_STUDIO_REPO_TOKEN }}
        run: |
          git remote add skd https://github.com/SKD-Photo-Studio/Frame2Frame.git
          git config --global url."https://x-access-token:${SKD_TOKEN}@github.com/".insteadOf "https://github.com/"
          git push skd main --force
